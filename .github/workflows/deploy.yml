
name: Autonomous Dashboard Update
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install PyGithub requests
      - name: Run Dashboard Engine
        run: python dailypost.py
