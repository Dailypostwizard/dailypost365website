<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyPost365 — GuessSlight2454 Intelligence</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0a2540;
      --accent-blue: #2565ae;
      --reddit-orange: #FF4500;
      --bg-soft: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-soft); 
      color: var(--primary); 
      line-height: 1.6;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }

    header { text-align: center; margin-bottom: 3rem; }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
    .profile-link { color: var(--reddit-orange); font-weight: 700; text-decoration: none; font-size: 0.9rem; }

    /* The Feed Section */
    .feed-title { margin-bottom: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    #reddit-feed { display: grid; gap: 1.5rem; }

    .post-card {
      background: #ffffff;
      padding: 2rem;
      border-radius: 1.5rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }
    .post-card:hover { transform: translateY(-3px); border-color: var(--reddit-orange); }

    .post-meta { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
    .post-card h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 1rem; color: #1a1a1b; line-height: 1.3; }
    .post-excerpt { color: #475569; font-size: 1rem; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    
    .btn-reddit {
      display: inline-block;
      background: var(--reddit-orange);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* Social Bar */
    .social-bar { 
      display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; 
      margin-top: 4rem; padding: 2rem; border-top: 1px solid #e2e8f0;
    }
    .social-item {
      text-decoration: none; color: var(--primary); font-weight: 700; font-size: 0.8rem;
      display: flex; align-items: center; gap: 8px; padding: 0.5rem 1rem; background: #fff;
      border-radius: 50px; border: 1px solid #e2e8f0; transition: 0.2s;
    }
    .social-item:hover { border-color: var(--reddit-orange); transform: translateY(-2px); }

    .loading-spinner { text-align: center; padding: 3rem; color: #94a3b8; font-weight: 600; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 class="logo">DailyPost365</h1>
      <a href="https://www.reddit.com/user/GuessSlight2454/" target="_blank" class="profile-link">
        <i class="fab fa-reddit"></i> Follow @GuessSlight2454
      </a>
    </header>

    <div class="feed-section">
      <h2 class="feed-title"><i class="fas fa-rss" style="color:var(--reddit-orange)"></i> Recent Intelligence Stream</h2>
      <div id="reddit-feed">
        <div class="loading-spinner">Syncing latest posts from Reddit...</div>
      </div>
    </div>

    <div class="social-bar">
      <a href="https://www.youtube.com/@DailyPostWizard" class="social-item" target="_blank"><i class="fab fa-youtube" style="color:red"></i> YouTube Crypto</a>
      <a href="https://www.youtube.com/@CoverDriveCricket-c5z" class="social-item" target="_blank"><i class="fab fa-youtube" style="color:red"></i> YouTube Cricket</a>
      <a href="https://x.com/DailyPostW92945" class="social-item" target="_blank"><i class="fab fa-x-twitter"></i> Twitter</a>
      <a href="https://www.tiktok.com/@dailypostwizard6" class="social-item" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
      <a href="https://www.instagram.com/dailypostwizard2026/" class="social-item" target="_blank"><i class="fab fa-instagram" style="color:#e1306c"></i> Instagram</a>
      <a href="https://www.linkedin.com/in/dailypostwizard-undefined-5742813ab/" class="social-item" target="_blank"><i class="fab fa-linkedin" style="color:#0077b5"></i> LinkedIn</a>
    </div>

    <footer style="text-align:center; padding: 2rem; color: #94a3b8; font-size: 0.75rem;">
      © 2026 DailyPost365. All analysis synced from Reddit profile GuessSlight2454.
    </footer>
  </div>

  <script>
    async function loadRedditPosts() {
      const feedContainer = document.getElementById('reddit-feed');
      const username = "GuessSlight2454";

      try {
        const response = await fetch(`https://www.reddit.com/user/${username}/submitted.json?limit=5`);
        const data = await response.json();
        const posts = data.data.children;

        feedContainer.innerHTML = ''; // Clear loading message

        posts.forEach(post => {
          const p = post.data;
          // Determine Category based on keywords
          let category = "General Update";
          if (p.title.toLowerCase().includes('crypto') || p.title.toLowerCase().includes('btc')) category = "Crypto Audit";
          if (p.title.toLowerCase().includes('cricket') || p.title.toLowerCase().includes('match')) category = "Cricket Strategy";

          const card = document.createElement('div');
          card.className = 'post-card';
          card.innerHTML = `
            <span class="post-meta">${category} • ${new Date(p.created_utc * 1000).toLocaleDateString()}</span>
            <h3>${p.title}</h3>
            <p class="post-excerpt">${p.selftext || 'Click below to view the full media/link update on Reddit.'}</p>
            <a href="https://www.reddit.com${p.permalink}" target="_blank" class="btn-reddit">Read Full Post</a>
          `;
          feedContainer.appendChild(card);
        });

      } catch (err) {
        feedContainer.innerHTML = '<div class="loading-spinner" style="color:red">Failed to sync feed. Please check back shortly.</div>';
      }
    }

    window.onload = loadRedditPosts;
  </script>
</body>
</html>
