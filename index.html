
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPost365 | BROADCAST ENGINE V8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #00FF00; --neon-yellow: #FFFF00; --obsidian: #000000; }
        
        body {
            margin: 0;
            background-color: var(--obsidian);
            /* LEGENDS BACKGROUND FIX */
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                              url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&q=80&w=2000'); 
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .broadcast-header { background: black; border-bottom: 2px solid var(--neon-green); padding: 15px; text-align: center; }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        
        .main-stage { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* VIDEO AUTO-UPDATE BOX */
        .video-container { aspect-ratio: 16/9; background: #111; border: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        .intel-bar { background: var(--neon-yellow); color: black; padding: 10px; font-family: 'Orbitron'; font-weight: 900; margin-top: 20px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        .intel-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); border: 1px solid #444; padding: 15px; border-radius: 8px; }
        .card-title { font-weight: 700; color: var(--neon-yellow); }
        .card-result { font-family: 'Orbitron'; color: var(--neon-green); font-size: 20px; }

        .ticker-wrap { position: fixed; bottom: 0; width: 100%; background: var(--neon-green); color: black; padding: 10px; font-family: 'Orbitron'; font-weight: 900; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .live-dot { display: inline-block; width: 8px; height: 8px; background: red; border-radius: 50%; margin-right: 5px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <header class="broadcast-header">
        <div class="logo">DAILYPOST365</div>
    </header>

    <div class="main-stage">
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/videoseries?list=UU_UCDOZDiiyP85pK8BCWiLP3pw" allowfullscreen></iframe>
        </div>

        <div class="intel-bar">LIVE CRICKET PULSE</div>
        <div class="grid-container">
            
        </div>
    </div>

    <div class="ticker-wrap"><div class="ticker">CRICKET WORLD EXCLUSIVE | DAILYPOST365 GLOBAL REACH | 365M VIEWS GOAL</div></div>
</body>
</html>
