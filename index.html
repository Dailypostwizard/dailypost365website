<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyPost365 — Global Intel Dashboard</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --crypto: #f59e0b;
      --cricket: #10b981;
      --reddit: #ff4500;
      --bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--primary); }

    /* Layout & Navigation */
    nav { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .nav-logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
    .live-indicator { font-size: 0.75rem; font-weight: 700; background: #fee2e2; color: #dc2626; padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
    .pulse { width: 8px; height: 8px; background: #dc2626; border-radius: 50%; animation: pulse 1.5s infinite; }

    /* Content Styling */
    .hero { padding: 3rem 2rem; text-align: center; }
    .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; }
    .container { max-width: 1300px; margin: 0 auto; padding: 0 2rem; }

    .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .featured-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }

    /* The Intelligence Cards */
    .featured-card {
      color: white; padding: 2.5rem; border-radius: 24px; position: relative;
      min-height: 320px; display: flex; flex-direction: column; justify-content: flex-end;
      transition: 0.3s; text-decoration: none; border: 1px solid rgba(0,0,0,0.1);
    }
    .featured-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    
    .featured-card.crypto { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); border-bottom: 6px solid var(--crypto); }
    .featured-card.cricket { background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%); border-bottom: 6px solid var(--cricket); }
    
    .label { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 6px; }
    .featured-card h2 { font-size: 1.6rem; margin-bottom: 1rem; line-height: 1.2; }
    .read-link { font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

    /* Sidebar Stream */
    .side-panel { background: #f8fafc; border-radius: 24px; padding: 1.5rem; border: 1px solid #e2e8f0; }
    .stream-item { padding: 1rem 0; border-bottom: 1px solid #e2e8f0; }
    .stream-item a { text-decoration: none; color: inherit; font-weight: 600; font-size: 0.95rem; }
    .stream-date { display: block; font-size: 0.7rem; color: #94a3b8; margin-top: 4px; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    @media (max-width: 900px) { .dashboard-grid, .featured-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">DAILYPOST365</div>
    <div class="live-indicator"><div class="pulse"></div> LIVE INTEL SYNC</div>
  </nav>

  <section class="hero">
    <h1>Data-Driven Insights.<br>Master the Market & the Game.</h1>
  </section>

  <div class="container">
    <div class="dashboard-grid">
      <main>
        <div class="featured-row">
          <a href="#" id="crypto-link" class="featured-card crypto" target="_blank">
            <span class="label">Latest Crypto Audit</span>
            <h2 id="crypto-title">Searching Crypto Records...</h2>
            <div class="read-link" id="crypto-btn-text">READ FULL AUDIT <i class="fas fa-arrow-right"></i></div>
          </a>

          <a href="#" id="cricket-link" class="featured-card cricket" target="_blank">
            <span class="label">Latest Cricket Strategy</span>
            <h2 id="cricket-title">Scanning Match Intel...</h2>
            <div class="read-link" id="cricket-btn-text">READ FULL STRATEGY <i class="fas fa-arrow-right"></i></div>
          </a>
        </div>
      </main>

      <aside class="side-panel">
        <h3 style="margin-bottom:1rem;">Recent Intelligence</h3>
        <div id="side-stream"></div>
      </aside>
    </div>
  </div>

  <script>
    async function syncGeniusFeed() {
      const username = "GuessSlight2454";
      const cryptoT = document.getElementById('crypto-title');
      const cryptoL = document.getElementById('crypto-link');
      const cricketT = document.getElementById('cricket-title');
      const cricketL = document.getElementById('cricket-link');
      const streamContainer = document.getElementById('side-stream');

      try {
        const response = await fetch(`https://www.reddit.com/user/${username}/submitted.json?limit=50`);
        const data = await response.json();
        const posts = data.data.children;

        // --- GENIUS CATEGORY FILTERING ---
        
        // 1. Find the Absolute Latest CRYPTO post
        const cryptoPost = posts.find(p => {
          const title = p.data.title.toLowerCase();
          return title.includes('crypto') || title.includes('btc') || title.includes('eth') || title.includes('asset') || title.includes('bitcoin') || title.includes('institutional');
        });

        if (cryptoPost) {
          cryptoT.innerText = cryptoPost.data.title;
          cryptoL.href = `https://www.reddit.com${cryptoPost.data.permalink}`;
        } else {
          cryptoT.innerText = "Check @GuessSlight2454 for Crypto Updates";
        }

        // 2. Find the Absolute Latest CRICKET post
        const cricketPost = posts.find(p => {
          const title = p.data.title.toLowerCase();
          return title.includes('cricket') || title.includes('ipl') || title.includes('match') || title.includes('runs') || title.includes('t20') || title.includes('world champion');
        });

        if (cricketPost) {
          cricketT.innerText = cricketPost.data.title;
          cricketL.href = `https://www.reddit.com${cricketPost.data.permalink}`;
        } else {
          cricketT.innerText = "Check @GuessSlight2454 for Cricket Updates";
        }

        // 3. Side Stream (Show all updates)
        streamContainer.innerHTML = '';
        posts.slice(0, 10).forEach(post => {
          const p = post.data;
          const item = document.createElement('div');
          item.className = 'stream-item';
          item.innerHTML = `
            <a href="https://www.reddit.com${p.permalink}" target="_blank">${p.title}</a>
            <span class="stream-date">${new Date(p.created_utc * 1000).toLocaleDateString()}</span>
          `;
          streamContainer.appendChild(item);
        });

      } catch (err) {
        console.error("Sync Error", err);
      }
    }

    window.onload = syncGeniusFeed;
  </script>
</body>
</html>
