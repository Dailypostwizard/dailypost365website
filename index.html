
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DailyPost365 | V59.0 Cinema-Grade 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #39FF14; --yellow: #CCFF00; --bg: #000; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        /* 30-STAGE QUALITY TICKER */
        .ticker {
            position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9);
            border-bottom: 3px solid var(--neon); z-index: 1000; display: flex; align-items: center;
        }
        .ticker-move { display: flex; white-space: nowrap; animation: scroll 35s linear infinite; font-family: 'Orbitron'; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .layout { display: grid; grid-template-columns: 320px 1fr 320px; height: 100vh; padding-top: 60px; gap: 15px; }
        .panel { background: rgba(255,255,255,0.03); border: 2px solid rgba(57,255,20,0.2); border-radius: 20px; padding: 20px; }

        /* 3D ANIMATION CONTAINERS */
        #egg-scene, #cricket-scene { width: 100%; height: 300px; border-radius: 15px; background: radial-gradient(circle, #222, #000); position: relative; }
        .price-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon); display: none; }

        .v-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; height: 80vh; }
        .v-box { height: 400px; border: 1px solid var(--yellow); border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-move">
        <span style="padding:0 50px;">LIVE BTC: $69,873.57</span>
        <span style="padding:0 50px; color:var(--neon);">ETH: $2,146.28</span>
        <span style="padding:0 50px;">KKR 25/2 (3.4) vs PBKS - RAIN STATUS ACTIVE</span>
    </div>
</div>

<div class="layout">
    <div class="panel">
        <h3 style="color:var(--neon); font-family:'Orbitron';">CRYPTO EGG BURST</h3>
        <div id="egg-scene" onclick="burstEgg()">
            <div id="btc-price" class="price-overlay">$69,873.57</div>
        </div>
        <p style="font-size:0.75rem; color:#888; margin-top:10px;">Click to Burst: Mimicking the v3D style animation.</p>
    </div>

    <div class="panel">
        <div class="v-grid">
            <div class="v-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/vUhYt8KRHfg" frameborder="0"></iframe></div>
            <div class="v-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/2IycUPkfb4o" frameborder="0"></iframe></div>
            <div class="v-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/vduuCaOhDno" frameborder="0"></iframe></div>
            <div class="v-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/7e49Bip--eA" frameborder="0"></iframe></div>
        </div>
    </div>

    <div class="panel">
        <h3 style="color:var(--yellow); font-family:'Orbitron';">CRICKET ACTION</h3>
        <div id="cricket-scene"></div>
        <div style="background:rgba(255,255,0,0.1); padding:10px; border-radius:10px; margin-top:10px;">
            <strong>KKR 25/2 (3.4) vs PBKS</strong>
        </div>
    </div>
</div>

<script>
    let egg;
    function initEgg() {
        const container = document.getElementById('egg-scene');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const geo = new THREE.SphereGeometry(1, 32, 32);
        const mat = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.1});
        egg = new THREE.Mesh(geo, mat);
        scene.add(egg);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            egg.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    }

    function burstEgg() {
        // The Burst Logic - Cartoon Style Expansion
        egg.scale.set(1.5, 1.5, 1.5);
        setTimeout(() => {
            egg.visible = false;
            document.getElementById('btc-price').style.display = 'block';
        }, 200);
    }

    initEgg();
</script>
</body>
</html>
