<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILYPOST365 | Dual-Intelligence Terminal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg: #05070a; --card-bg: #0d1117; --text: #f0f6fc; 
            --border: rgba(255, 255, 255, 0.1); --accent: #3b82f6;
            --cricket-glow: #10b981; --crypto-glow: #f59e0b;
        }

        [data-theme="light"] {
            --bg: #f6f8fa; --card-bg: #ffffff; --text: #1f2328; 
            --border: rgba(0, 0, 0, 0.1); --accent: #0969da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* NAVBAR */
        nav {
            padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000; background: var(--bg);
        }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .theme-toggle {
            background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700;
            display: flex; align-items: center; gap: 10px; font-size: 0.8rem;
        }

        /* MAIN LAYOUT */
        .dashboard {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 40px 5%;
            max-width: 1600px; margin: 0 auto;
        }

        .terminal-panel {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 32px; padding: 30px; position: relative; overflow: hidden;
        }

        .panel-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
        }

        /* VIDEO SLOTS */
        .main-video-slot {
            width: 100%; aspect-ratio: 16/9; border-radius: 20px; margin: 20px 0;
            background: #000; overflow: hidden; border: 1px solid var(--border);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* OPPOSITE SCROLLING ARCHIVES */
        .archive-container { margin-top: 25px; overflow: hidden; }
        .archive-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 15px; }
        
        .scroll-wrapper { display: flex; gap: 15px; padding-bottom: 10px; cursor: grab; }
        
        /* Cricket scrolls left-to-right, Crypto scrolls right-to-left */
        .scroll-left { animation: scrollLeft 40s linear infinite; }
        .scroll-right { animation: scrollRight 40s linear infinite; }

        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scrollRight { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        .archive-card {
            flex: 0 0 180px; height: 110px; border-radius: 12px; background: #1a1f26;
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }

        /* SOCIAL MEDIA TABS */
        .social-dock {
            grid-column: span 2; display: flex; justify-content: center; gap: 20px;
            padding: 40px 0; border-top: 1px solid var(--border); margin-top: 20px;
        }
        .dock-tab {
            width: 60px; height: 60px; border-radius: 18px; background: var(--card-bg);
            border: 1px solid var(--border); display: flex; align-items: center;
            justify-content: center; color: var(--text); font-size: 1.5rem; text-decoration: none;
        }
        .dock-tab:hover { transform: translateY(-10px); border-color: var(--accent); color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 1100px) { .dashboard { grid-template-columns: 1fr; } .social-dock { grid-column: span 1; } }
    </style>
</head>
<body>

            <div class="archive-container">
                <p class="archive-title" style="text-align: right;">Institutional Whale Tracker</p>

            <a href="https://www.instagram.com/dailypostwizard2026/" class="dock-tab"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@dailypostwizard6" class="dock-tab"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.linkedin.com/in/dailypostwizard-undefined-5742813ab/" class="dock-tab"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="dock-tab"><i class="fab fa-telegram"></i></a>
        </div>
    </main>
