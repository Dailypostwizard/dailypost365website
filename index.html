
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DailyPost365 | V60.0 Cinema Apex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #39FF14; --yellow: #CCFF00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        /* 3D SOCIAL SIDEBAR - RESTORED */
        .social-sidebar {
            position: fixed; left: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 9999;
        }
        .social-btn {
            width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 2px solid var(--neon);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem; text-decoration: none; transition: 0.5s;
        }
        .social-btn:hover { transform: perspective(500px) translateZ(50px) rotateY(20deg); background: var(--neon); color: black; box-shadow: 0 0 25px var(--neon); }

        /* CINEMA GRID */
        .grid { display: grid; grid-template-columns: 350px 1fr 350px; height: 100vh; padding: 60px 20px 20px 85px; gap: 20px; box-sizing: border-box; }
        .panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(57,255,20,0.1); border-radius: 25px; padding: 20px; overflow: hidden; position: relative; }
        
        .ticker { position: fixed; top: 0; width: 100%; height: 50px; background: #000; border-bottom: 3px solid var(--neon); z-index: 1000; display: flex; align-items: center; }
        .ticker-move { display: flex; white-space: nowrap; animation: scroll 30s linear infinite; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #egg-canvas, #cricket-canvas { width: 100%; height: 350px; }
        .reveal-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 5; font-family: 'Orbitron'; color: var(--neon); }
        
        .video-scroll { display: grid; grid-template-columns: 1fr; gap: 15px; overflow-y: auto; height: 85vh; padding-right: 10px; }
        .v-card { border: 2px solid var(--yellow); border-radius: 15px; overflow: hidden; background: #000; transition: 0.5s; }
        .v-card:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-move">
        <span style="padding:0 50px;">BTC: $69,873.57 (Live Mirror)</span>
        <span style="padding:0 50px; color:var(--neon);">ETH: $2,146.28</span>
        <span style="padding:0 50px;">KKR 25/2 (3.4) vs PBKS - RAIN DELAY</span>
    </div>
</div>

<div class="social-sidebar">
    <a href="https://youtube.com/@DailyPost365" class="social-btn"><i class="fab fa-youtube"></i></a>
    <a href="https://t.me/DailyPost365" class="social-btn"><i class="fab fa-telegram"></i></a>
    <a href="https://instagram.com/DailyPost365" class="social-btn"><i class="fab fa-instagram"></i></a>
    <a href="https://tiktok.com/@DailyPost365" class="social-btn"><i class="fab fa-tiktok"></i></a>
</div>

<div class="grid">
    <div class="panel">
        <h2 style="color:var(--neon); font-family:'Orbitron'; font-size:1.2rem;">CRYPTO EGG FRACTURE</h2>
        <div id="egg-canvas" onclick="crackEgg()"></div>
        <div id="btc-reveal" class="reveal-text">
            <i class="fab fa-bitcoin" style="font-size:3rem; color:orange;"></i><br>
            <span style="font-size:1.4rem;">$69,873.57</span>
        </div>
        <p style="font-size:0.8rem; text-align:center;">[CLICK TO FRACTURE SHELL]</p>
    </div>

    <div class="panel">
        <div class="video-scroll">
            <div class="v-card"><iframe width="100%" height="450" src="https://www.youtube.com/embed/vUhYt8KRHfg" frameborder="0"></iframe></div>
            <div class="v-card"><iframe width="100%" height="450" src="https://www.youtube.com/embed/2IycUPkfb4o" frameborder="0"></iframe></div>
            <div class="v-card"><iframe width="100%" height="450" src="https://www.youtube.com/embed/vduuCaOhDno" frameborder="0"></iframe></div>
            <div class="v-card"><iframe width="100%" height="450" src="https://www.youtube.com/embed/7e49Bip--eA" frameborder="0"></iframe></div>
        </div>
    </div>

    <div class="panel">
        <h2 style="color:var(--yellow); font-family:'Orbitron'; font-size:1.2rem;">IPL STRIKE 3D</h2>
        <div id="cricket-canvas" onclick="hitBall()"></div>
        <div id="score-reveal" class="reveal-text">
            <span style="font-size:1.4rem; color:var(--yellow);">KKR 25/2 (3.4) vs PBKS</span>
        </div>
        <p style="font-size:0.8rem; text-align:center;">[CLICK TO BOWL & STRIKE]</p>
    </div>
</div>

<script>
    let scene, camera, renderer, egg, shellParts = [];

    function init3D(id, isEgg) {
        const container = document.getElementById(id);
        const s = new THREE.Scene();
        const c = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
        const r = new THREE.WebGLRenderer({antialias: true, alpha: true});
        r.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(r.domElement);

        if(isEgg) {
            const geo = new THREE.SphereGeometry(1.2, 32, 32);
            const mat = new THREE.MeshStandardMaterial({color: 0xf0f0f0, roughness: 0.2});
            egg = new THREE.Mesh(geo, mat);
            s.add(egg);
        } else {
            const pitchGeo = new THREE.BoxGeometry(2.5, 0.1, 4);
            const pitchMat = new THREE.MeshStandardMaterial({color: 0x222});
            const pitch = new THREE.Mesh(pitchGeo, pitchMat);
            s.add(pitch);
        }

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 5, 5);
        s.add(light);
        c.position.z = 4;

        function anim() {
            requestAnimationFrame(anim);
            if(egg) egg.rotation.y += 0.005;
            r.render(s, c);
        }
        anim();
    }

    function crackEgg() {
        gsap.to(egg.scale, {duration: 0.3, x: 1.5, y: 1.5, z: 1.5, ease: "bounce.out"});
        setTimeout(() => {
            egg.visible = false;
            document.getElementById('btc-reveal').style.display = 'block';
            gsap.from("#btc-reveal", {duration: 1, scale: 0, opacity: 0, ease: "elastic.out"});
        }, 300);
    }

    init3D('egg-canvas', true);
    init3D('cricket-canvas', false);
    
    console.log("V60.0 UAE Compliance: April 6, 2026 | No Restricted Content.");
</script>
</body>
</html>
