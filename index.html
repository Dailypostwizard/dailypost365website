
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPost365 | Global Broadcast</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00FF00; --yellow: #FFFF00; --bg: #050505; }
        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=2000');
            background-size: cover; background-attachment: fixed;
        }
        .header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(0,255,0,0.2); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 4px; }
        
        .main-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        .video-box { 
            position: relative; border-radius: 20px; overflow: hidden; 
            border: 2px solid var(--neon); box-shadow: 0 0 40px rgba(0,255,0,0.2);
            background: black; aspect-ratio: 16/9;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px;
            transition: 0.3s;
        }
        .glass-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .live-indicator { color: #FF3E3E; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: #FF3E3E; border-radius: 50%; animation: pulse 1s infinite; }
        .match-title { font-size: 14px; color: #aaa; text-transform: uppercase; }
        .match-score { font-family: 'Orbitron'; font-size: 18px; color: var(--yellow); margin-top: 5px; }

        .social-dock { 
            display: flex; justify-content: center; gap: 30px; margin-top: 40px; 
            background: rgba(0,255,0,0.05); padding: 20px; border-radius: 100px; border: 1px solid rgba(0,255,0,0.1);
        }
        .social-dock a { color: white; transition: 0.3s; }
        .social-dock a:hover { color: var(--neon); transform: scale(1.2); }

        .ticker-bar { position: fixed; bottom: 0; width: 100%; background: var(--neon); color: black; padding: 12px; font-family: 'Orbitron'; font-weight: 900; overflow: hidden; }
        .scroll { display: inline-block; white-space: nowrap; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header"><div class="logo">DAILYPOST365</div></div>

    <div class="main-container">
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/videoseries?list=UU_UCDOZDiiyP85pK8BCWiLP3pw" allowfullscreen></iframe>
        </div>

        <h2 style="font-family: 'Orbitron'; margin-top: 50px; font-size: 18px; border-left: 4px solid var(--neon); padding-left: 15px;">LIVE BROADCAST INTEL</h2>
        <div class="stats-grid"><p>Awaiting Live Match Data...</p></div>

        <div class="social-dock">
            <a href="https://youtube.com/@DailyPost365"><i data-lucide="youtube"></i></a>
            <a href="https://instagram.com/dailypostwizard2026"><i data-lucide="instagram"></i></a>
            <a href="https://tiktok.com/@dailypost365"><i data-lucide="video"></i></a>
            <a href="https://x.com/DailyPostW92945"><i data-lucide="twitter"></i></a>
        </div>
    </div>

    <div class="ticker-bar"><div class="scroll">VIRAT KOHLI RECORD WATCH | IPL 2026 PREP | DAILYPOST365 GLOBAL NEWS NETWORK</div></div>
    <script>lucide.createIcons();</script>
</body>
</html>
