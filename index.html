
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyPost365 | Global Broadcast Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #39FF14; --yellow: #CCFF00; --dark: #050505; }
        body { 
            margin: 0; background: var(--dark); color: white; font-family: 'Oswald', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=2000');
            background-size: cover; background-attachment: fixed;
        }

        /* LIVE BROADCAST TICKER */
        .master-ticker { background: #fff; color: #000; padding: 10px 0; font-weight: 900; border-bottom: 3px solid var(--neon); }
        
        /* FLOATING SOCIAL DOCK (RE-ADDED & FIXED) */
        .social-dock {
            position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .soc-icon {
            width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-size: 22px; transition: 0.3s;
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon); color: white; text-decoration: none;
        }
        .soc-icon:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--neon); background: var(--neon); color: black; }

        .main-hub { max-width: 1400px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .legend-title { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--yellow); text-shadow: 0 0 30px var(--yellow); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="master-ticker">
