
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DailyPost365 | V61.0 Cinema Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #39FF14; --yellow: #CCFF00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        /* CINEMATIC BACKGROUND VIDEO OVERLAY */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.2; filter: contrast(150%); }

        /* SOCIAL BAR - Z-INDEX CORRECTION */
        .social-sidebar {
            position: fixed; left: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 10000;
        }
        .social-btn {
            width: 50px; height: 50px; background: #000; border: 2px solid var(--yellow);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--yellow); font-size: 1.3rem; text-decoration: none; transition: 0.3s;
        }
        .social-btn:hover { background: var(--yellow); color: black; transform: scale(1.2); box-shadow: 0 0 20px var(--yellow); }

        /* NOVA AVATAR WELCOME */
        #nova-welcome {
            position: fixed; bottom: -200px; right: 20px; z-index: 9999;
            transition: 1s ease-in-out; cursor: pointer;
        }
        .bubble {
            background: var(--neon); color: black; padding: 10px 15px; border-radius: 20px;
            position: absolute; top: -50px; left: -50px; font-weight: bold; font-size: 0.8rem; display: none;
        }

        /* LAYOUT CARDS */
        .main-container { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; padding: 80px 40px; }
        .glass-card {
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon); border-radius: 30px;
            padding: 25px; box-shadow: inset 0 0 15px var(--neon); text-align: center;
        }
        
        .price-text { font-family: 'Orbitron'; color: var(--neon); font-size: 2rem; margin-top: 15px; }
        #egg-fracture { width: 100%; height: 250px; cursor: pointer; }
        
        iframe { border-radius: 20px; border: 4px solid var(--yellow); }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-cricket-player-batting-in-a-stadium-at-sunset-30128-large.mp4" type="video/mp4">
</video>

<div class="social-sidebar">
    <a href="https://youtube.com/@DailyPost365" class="social-btn"><i class="fab fa-youtube"></i></a>
    <a href="https://t.me/DailyPost365" class="social-btn"><i class="fab fa-telegram"></i></a>
    <a href="https://instagram.com/DailyPost365" class="social-btn"><i class="fab fa-instagram"></i></a>
    <a href="https://tiktok.com/@DailyPost365" class="social-btn"><i class="fab fa-tiktok"></i></a>
</div>

<div id="nova-welcome">
    <div class="bubble">WELCOME TO DAILYPOST365!</div>
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" width="100" alt="Nova Avatar">
</div>

<div class="main-container">
    <div class="glass-card">
        <h2 style="color:var(--neon)">BTC FRACTURE</h2>
        <div id="egg-fracture"></div>
        <div id="btc-data" style="display:none;">
            <i class="fab fa-bitcoin" style="color:orange; font-size:4rem;"></i>
            <div class="price-text">$69,873.57</div>
        </div>
        <p>[CLICK TO REVEAL PRICE]</p>
    </div>

    <div class="glass-card" style="border-color: var(--yellow);">
        <h2 style="color:var(--yellow)">CINEMA BROADCAST</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/vUhYt8KRHfg" frameborder="0"></iframe>
        <div style="margin-top:20px; font-weight:bold; color:var(--neon);">KKR 25/2 (3.4) vs PBKS</div>
    </div>

    <div class="glass-card">
        <h2 style="color:var(--neon)">IPL 3D STRIKE</h2>
        <div id="cricket-pitch"></div>
        <div id="score-data" style="display:none;">
            <h1 style="color:var(--yellow)">KKR: 25/2</h1>
            <p>RAIN DELAY - STATUS: ACTIVE</p>
        </div>
        <p>[CLICK TO BOWL]</p>
    </div>
</div>

<script>
    // NOVA ENTRANCE
    setTimeout(() => {
        document.getElementById('nova-welcome').style.bottom = '20px';
        setTimeout(() => { document.querySelector('.bubble').style.display = 'block'; }, 1000);
    }, 1500);

    // 3D ENGINES
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    let renderer = new THREE.WebGLRenderer({alpha: true, antialias: true});
    
    // Egg Physics
    const eggGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const eggMat = new THREE.MeshPhongMaterial({color: 0xffffff, shininess: 100});
    const egg = new THREE.Mesh(eggGeo, eggMat);
    scene.add(egg);
    
    const light = new THREE.PointLight(0x39FF14, 2, 50);
    light.position.set(5, 5, 5);
    scene.add(light);
    camera.position.z = 5;

    const container = document.getElementById('egg-fracture');
    renderer.setSize(container.clientWidth, 250);
    container.appendChild(renderer.domElement);

    function animate() {
        requestAnimationFrame(animate);
        egg.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();

    function crackEgg() {
        gsap.to(egg.scale, {duration: 0.5, x: 0, y: 0, z: 0, ease: "power4.in"});
        setTimeout(() => {
            container.style.display = 'none';
            document.getElementById('btc-data').style.display = 'block';
            gsap.from("#btc-data", {duration: 1, y: 50, opacity: 0, ease: "elastic.out"});
        }, 500);
    }
    container.addEventListener('click', crackEgg);
</script>
</body>
</html>
