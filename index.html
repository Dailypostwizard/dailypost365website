<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILYPOST365 | Dual-Intelligence Terminal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg: #010409; --text: #f0f6fc; --glass: rgba(13, 17, 23, 0.85);
            --border: rgba(255, 255, 255, 0.08); --accent: #3b82f6;
            --cricket: #10b981; --crypto: #f59e0b;
        }

        [data-theme="light"] {
            --bg: #f6f8fa; --text: #1f2328; --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1); --accent: #0969da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* HEADER & THEME TOGGLE */
        nav {
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000; background: var(--glass);
        }
        .theme-btn {
            background: var(--accent); color: #fff; border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 12px;
        }

        /* DUAL TERMINAL LAYOUT */
        .main-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px 5%;
        }

        .terminal-block {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; display: flex; flex-direction: column; gap: 20px;
        }

        /* SPOTLIGHT VIDEO */
        .spotlight-card {
            width: 100%; height: 300px; border-radius: 16px; position: relative;
            overflow: hidden; background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
            text-decoration: none; color: #fff; border: 1px solid var(--border);
        }
        .spotlight-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #000 70%, transparent); z-index: 1; }
        .spotlight-card * { position: relative; z-index: 2; }

        /* HORIZONTAL SCROLLING ARCHIVES */
        .archive-scroll {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .archive-scroll::-webkit-scrollbar { height: 4px; }
        .archive-item {
            flex: 0 0 160px; height: 100px; border-radius: 12px; border: 1px solid var(--border);
            background-size: cover; background-position: center; transition: 0.3s;
        }
        .archive-item:hover { transform: scale(1.05); border-color: var(--accent); }

        /* CRYPTO WIDGET AREA */
        .crypto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* SOCIAL MEDIA TABS */
        .social-bar {
            grid-column: span 2; display: flex; justify-content: center; gap: 15px; padding: 20px;
        }
        .social-tab {
            width: 50px; height: 50px; border-radius: 12px; background: var(--glass);
            border: 1px solid var(--border); display: flex; align-items: center;
            justify-content: center; color: var(--text); font-size: 1.4rem; text-decoration: none;
        }
        .social-tab:hover { background: var(--accent); color: #fff; transform: translateY(-5px); }

        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem;">DAILYPOST<span>365</span></div>
        <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-adjust"></i> SWITCH MODE</button>
    </nav>

    <div class="main-container">
        
        <section class="terminal-block" style="border-top: 4px solid var(--cricket);">
            <div style="display: flex; justify-content: space-between;">
                <h2 style="font-weight: 900;"><i class="fas fa-baseball-ball"></i> CRICKET FEED</h2>
                <span style="font-size: 10px; color: var(--cricket);">LATEST UPLOAD</span>
            </div>

            <a href="https://www.youtube.com/shorts/bc35pOB6P7Y" class="spotlight-card" style="background-image: url('https://img.youtube.com/vi/bc35pOB6P7Y/maxresdefault.jpg');">
                <h3>Tactical Masterclass</h3>
                <p style="font-size: 0.8rem; opacity: 0.8;">Analyzing the latest match dynamics and fielding setups.</p>
            </a>

            <p style="font-size: 11px; font-weight: 700; color: var(--accent);">PREVIOUS 15 TACTICALS</p>
            <div class="archive-scroll" id="cricket-scroll">
                </div>
        </section>

        <section class="terminal-block" style="border-top: 4px solid var(--crypto);">
            <div style="display: flex; justify-content: space-between;">
                <h2 style="font-weight: 900;"><i class="fas fa-chart-line"></i> CRYPTO WHALE FEED</h2>
                <span style="font-size: 10px; color: var(--crypto);">LIVE MARKET SYNC</span>
            </div>

            <a href="https://www.youtube.com/@DailyPostWizard" class="spotlight-card" style="background-image: url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=600');">
                <h3>Whale Wallet Tracker</h3>
                <p style="font-size: 0.8rem; opacity: 0.8;">Monitoring institutional flows for BTC & SOL.</p>
            </a>

            <div class="crypto-grid">
                <script src="https://widgets.coingecko.com/coingecko-coin-price-chart-widget.js"></script>
                <coingecko-coin-price-chart-widget coin-id="bitcoin" currency="usd" height="150" locale="en" background-color="#0d1117"></coingecko-coin-price-chart-widget>
                <coingecko-coin-price-chart-widget coin-id="solana" currency="usd" height="150" locale="en" background-color="#0d1117"></coingecko-coin-price-chart-widget>
            </div>

            <p style="font-size: 11px; font-weight: 700; color: var(--accent);">CRYPTO ARCHIVE</p>
            <div class="archive-scroll" id="crypto-scroll">
                </div>
        </section>

        <div class="social-bar">
            <a href="https://www.youtube.com/@DailyPostWizard" class="social-tab" title="Crypto YouTube"><i class="fab fa-youtube" style="color:#FF0000;"></i></a>
            <a href="https://www.youtube.com/@CoverDriveCricket-c5z" class="social-tab" title="Cricket YouTube"><i class="fas fa-video"></i></a>
            <a href="https://x.com/DailyPostW92945" class="social-tab"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/dailypostwizard2026/" class="social-tab"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@dailypostwizard6" class="social-tab"><i class="fab fa-tiktok"></i></a>
            <a href="#" class="social-tab"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <script>
        // 1. Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // 2. Populate Archives (15 slots each)
        function populateArchives() {
            const cricket = document.getElementById('cricket-scroll');
            const crypto = document.getElementById('crypto-scroll');

            for(let i=1; i<=15; i++) {
                // Cricket Slots
                let crk = document.createElement('a');
                crk.className = 'archive-item';
                crk.href = "#";
                crk.style.backgroundImage = `url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&w=200&q=80')`;
                cricket.appendChild(crk);

                // Crypto Slots
                let cry = document.createElement('a');
                cry.className = 'archive-item';
                cry.href = "#";
                cry.style.backgroundImage = `url('https://images.unsplash.com/photo-1621761191319-c6fb62004040?auto=format&fit=crop&w=200&q=80')`;
                crypto.appendChild(cry);
            }
        }
        populateArchives();
    </script>
</body>
</html>
