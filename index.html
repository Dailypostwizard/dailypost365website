
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DailyPost365 | V57.0 Interactive 3D World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #39FF14; --yellow: #CCFF00; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        /* TICKER SYSTEM */
        .ticker-bar {
            position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--neon); z-index: 1000; display: flex; align-items: center;
        }
        .ticker-text { display: flex; white-space: nowrap; animation: scroll 25s linear infinite; font-family: 'Orbitron'; font-weight: 900; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 3-COLUMN BROADCAST LAYOUT */
        .layout {
            display: grid; grid-template-columns: 300px 1fr 300px; height: 100vh; padding-top: 55px; gap: 10px;
        }

        /* 3D CANVAS OVERLAYS */
        #crypto-canvas, #cricket-canvas { width: 100%; height: 250px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid var(--neon); }
        
        .panel { background: rgba(255,255,255,0.02); padding: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(57,255,20,0.1); overflow-y: auto; }
        
        /* SOCIAL SIDEBAR */
        .sidebar { position: fixed; left: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .icon { width: 45px; height: 45px; border: 1px solid var(--neon); border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s; background: #000; }
        .icon:hover { transform: scale(1.2) rotate(10deg); background: var(--neon); color: #000; }

        .video-box { width: 100%; height: 400px; border: 1px solid var(--yellow); border-radius: 15px; margin-bottom: 15px; transition: 0.5s; }
        .video-box:hover { transform: translateZ(50px); box-shadow: 0 0 30px var(--neon); }
    </style>
</head>
<body>

<div class="ticker-bar">
    <div class="ticker-text">
        <span style="padding:0 50px;">BTC: $69,873.57</span>
        <span style="padding:0 50px; color:var(--neon);">ETH: $2,146.28</span>
        <span style="padding:0 50px;">KKR 25/2 (3.4) vs PBKS - RAIN DELAY</span>
        <span style="padding:0 50px; color:var(--yellow);">VIRAT KOHLI MILESTONE: 8,661 RUNS</span>
    </div>
</div>

<div class="sidebar">
    <a href="#" class="icon"><i class="fab fa-youtube"></i></a>
    <a href="#" class="icon"><i class="fab fa-telegram"></i></a>
    <a href="#" class="icon"><i class="fab fa-instagram"></i></a>
</div>

<div class="layout">
    <div class="panel">
        <h3 style="color:var(--neon); font-family:'Orbitron';">CRYPTO HUB</h3>
        <div id="crypto-canvas"></div> <div style="margin-top:15px; border-left:4px solid var(--neon); padding-left:10px;">
            <small>Market Cap</small><br><strong>$2.46T</strong>
        </div>
    </div>

    <div class="panel" style="overflow-y:scroll;">
        <div class="video-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/vUhYt8KRHfg" frameborder="0"></iframe></div>
        <div class="video-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/2IycUPkfb4o" frameborder="0"></iframe></div>
    </div>

    <div class="panel">
        <h3 style="color:var(--yellow); font-family:'Orbitron';">CRICKET LIVE</h3>
        <div id="cricket-canvas"></div> <div style="margin-top:15px; background:rgba(57,255,20,0.1); padding:15px; border-radius:10px;">
            <strong>KKR 25/2 (3.4) vs PBKS</strong><br>
            <small>Match Points Shared | UAE 18:00 Bridge Active</small>
        </div>
    </div>
</div>

<script>
    // --- THREE.JS ENGINE ---
    function init3D(containerId, color) {
        const container = document.getElementById(containerId);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.IcosahedronGeometry(1, 0);
        const material = new THREE.MeshBasicMaterial({ color: color, wireframe: true });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    }

    init3D('crypto-canvas', 0x39FF14); // Neon Green for Crypto
    init3D('cricket-canvas', 0xCCFF00); // Yellow for Cricket
</script>

</body>
</html>
